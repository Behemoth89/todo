openapi: 3.0.3
info:
  title: Family Chores API
  version: 1.0.0
  description: API for managing family chores, todos, shopping lists, and settings
servers:
  - url: http://localhost:3000/api
    description: Development server
paths:
  /auth/register:
    post:
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                  error:
                    type: string
                    nullable: true
        '400':
          description: Bad request or email already registered

  /auth/login:
    post:
      summary: Login user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                  error:
                    type: string
                    nullable: true
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      summary: Refresh access token
      operationId: refreshToken
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                  error:
                    type: string
                    nullable: true
        '401':
          description: Invalid or missing refresh token

  /auth/logout:
    post:
      summary: Logout user
      operationId: logout
      responses:
        '200':
          description: Logout successful

  /todos:
    get:
      summary: List todos
      operationId: getTodos
      parameters:
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [title, createdAt, dueDate, completedAt, startDate, priorityId, locationId]
          default: createdAt
        - in: query
          name: sortOrder
          schema:
            type: string
            enum: [asc, desc]
          default: desc
        - in: query
          name: priorityId
          schema:
            type: string
        - in: query
          name: locationId
          schema:
            type: string
        - in: query
          name: assigneeId
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [completed, incomplete]
        - in: query
          name: startDateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: startDateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: dueDateFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: dueDateTo
          schema:
            type: string
            format: date-time
        - in: query
          name: completedFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: completedTo
          schema:
            type: string
            format: date-time
        - in: query
          name: readyToExecute
          schema:
            type: string
            enum: ['true', 'false']
      responses:
        '200':
          description: A list of todos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      todos:
                        type: array
                        items:
                          $ref: '#/components/schemas/Todo'
                  error:
                    type: string
                    nullable: true
        '401':
          description: Authentication required
    post:
      summary: Create a todo
      operationId: createTodo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoCreateInput'
      responses:
        '200':
          description: Created todo
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      todo:
                        $ref: '#/components/schemas/Todo'
                  error:
                    type: string
                    nullable: true
        '400':
          description: Bad request
        '401':
          description: Authentication required

  /todos/{id}:
    get:
      summary: Get a single todo
      operationId: getTodoById
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Todo details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      todo:
                        $ref: '#/components/schemas/Todo'
                  error:
                    type: string
                    nullable: true
        '401':
          description: Authentication required
        '404':
          description: Todo not found
    put:
      summary: Update a todo
      operationId: updateTodo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoUpdateInput'
      responses:
        '200':
          description: Updated todo
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      todo:
                        $ref: '#/components/schemas/Todo'
                  error:
                    type: string
                    nullable: true
        '400':
          description: Bad request
        '401':
          description: Authentication required
        '404':
          description: Todo not found
    delete:
      summary: Soft delete a todo
      operationId: deleteTodo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Todo deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                  error:
                    type: string
                    nullable: true
        '401':
          description: Authentication required
        '404':
          description: Todo not found

  /todos/{id}/complete:
    post:
      summary: Mark todo as complete
      operationId: completeTodo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Todo marked as complete
        '401':
          description: Authentication required
        '404':
          description: Todo not found

  /todos/{id}/uncomplete:
    post:
      summary: Mark todo as incomplete
      operationId: uncompleteTodo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Todo marked as incomplete
        '401':
          description: Authentication required
        '404':
          description: Todo not found

  /shopping-items:
    get:
      summary: Get shopping items
      operationId: getShoppingItems
      parameters:
        - in: query
          name: bought
          schema:
            type: string
            enum: ['true', 'false']
        - in: query
          name: todoId
          schema:
            type: string
        - in: query
          name: locationId
          schema:
            type: string
      responses:
        '200':
          description: List of shopping items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ShoppingItem'
                  error:
                    type: string
                    nullable: true
        '401':
          description: Authentication required
    post:
      summary: Create shopping item
      operationId: createShoppingItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingItemCreateInput'
      responses:
        '200':
          description: Created shopping item
        '401':
          description: Authentication required

  /shopping-items/{id}:
    put:
      summary: Update shopping item
      operationId: updateShoppingItem
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShoppingItemUpdateInput'
      responses:
        '200':
          description: Updated shopping item
        '401':
          description: Authentication required
        '404':
          description: Shopping item not found
    delete:
      summary: Delete shopping item
      operationId: deleteShoppingItem
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shopping item deleted
        '401':
          description: Authentication required
        '404':
          description: Shopping item not found

  /shopping-items/{id}/buy:
    post:
      summary: Mark shopping item as bought
      operationId: buyShoppingItem
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Shopping item marked as bought
        '401':
          description: Authentication required
        '404':
          description: Shopping item not found

  /settings/priorities:
    get:
      summary: List priorities
      operationId: getPriorities
      responses:
        '200':
          description: List of priorities
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      priorities:
                        type: array
                        items:
                          $ref: '#/components/schemas/Priority'
                  error:
                    type: string
                    nullable: true
        '401':
          description: Authentication required
    post:
      summary: Create priority
      operationId: createPriority
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriorityCreateInput'
      responses:
        '200':
          description: Created priority
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      priority:
                        $ref: '#/components/schemas/Priority'
                  error:
                    type: string
                    nullable: true
        '401':
          description: Authentication required

  /settings/priorities/{id}:
    put:
      summary: Update priority
      operationId: updatePriority
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriorityUpdateInput'
      responses:
        '200':
          description: Updated priority
        '401':
          description: Authentication required
        '404':
          description: Priority not found
    delete:
      summary: Delete priority
      operationId: deletePriority
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Priority deleted
        '401':
          description: Authentication required
        '404':
          description: Priority not found

  /settings/locations:
    get:
      summary: List locations
      operationId: getLocations
      responses:
        '200':
          description: List of locations
        '401':
          description: Authentication required
    post:
      summary: Create location
      operationId: createLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationCreateInput'
      responses:
        '200':
          description: Created location
        '401':
          description: Authentication required

  /settings/locations/{id}:
    put:
      summary: Update location
      operationId: updateLocation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated location
        '401':
          description: Authentication required
        '404':
          description: Location not found
    delete:
      summary: Delete location
      operationId: deleteLocation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Location deleted
        '401':
          description: Authentication required
        '404':
          description: Location not found

  /settings/family-members:
    get:
      summary: List family members
      operationId: getFamilyMembers
      responses:
        '200':
          description: List of family members
        '401':
          description: Authentication required
    post:
      summary: Create family member
      operationId: createFamilyMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FamilyMemberCreateInput'
      responses:
        '200':
          description: Created family member
        '401':
          description: Authentication required

  /settings/family-members/{id}:
    put:
      summary: Update family member
      operationId: updateFamilyMember
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated family member
        '401':
          description: Authentication required
        '404':
          description: Family member not found
    delete:
      summary: Delete family member
      operationId: deleteFamilyMember
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Family member deleted
        '401':
          description: Authentication required
        '404':
          description: Family member not found

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string

    Todo:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        priorityId:
          type: string
          nullable: true
        locationId:
          type: string
          nullable: true
        parentId:
          type: string
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        readyToExecute:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        priority:
          $ref: '#/components/schemas/Priority'
        location:
          $ref: '#/components/schemas/Location'
        assignees:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              familyMember:
                $ref: '#/components/schemas/FamilyMember'

    TodoCreateInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        priorityId:
          type: string
        locationId:
          type: string
        assigneeIds:
          type: array
          items:
            type: string
        startDate:
          type: string
          format: date-time
        dueDate:
          type: string
          format: date-time
        notes:
          type: string

    TodoUpdateInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        priorityId:
          type: string
          nullable: true
        locationId:
          type: string
          nullable: true
        assigneeIds:
          type: array
          items:
            type: string
        parentId:
          type: string
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true

    ShoppingItem:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
        amount:
          type: number
          nullable: true
        price:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true
        boughtAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        todo:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            location:
              type: string
              nullable: true

    ShoppingItemCreateInput:
      type: object
      required: [todoId, description]
      properties:
        todoId:
          type: string
        description:
          type: string
        amount:
          type: number
        price:
          type: number
        notes:
          type: string

    ShoppingItemUpdateInput:
      type: object
      properties:
        description:
          type: string
        amount:
          type: number
        price:
          type: number
        notes:
          type: string

    Priority:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        value:
          type: integer
        sortOrder:
          type: integer
        userId:
          type: string

    PriorityCreateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        sortOrder:
          type: integer
          default: 0

    PriorityUpdateInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        sortOrder:
          type: integer

    Location:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        userId:
          type: string

    LocationCreateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    FamilyMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        userId:
          type: string

    FamilyMemberCreateInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
